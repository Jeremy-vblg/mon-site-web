[build]
publish = "." # Dossier à déployer
command = "" # Commande de build (vide pour site statique)
[build.environment]
NODE_VERSION = "22" # Version de Node.js si nécessaire
# Redirections personnalisées
[[redirects]]
from = "/ancien-chemin"
to = "/nouveau-chemin"
status = 301
# En-têtes HTTP de sécurité
[[headers]]
for = "/*"
[headers.values]
X-Frame-Options = "DENY"
X-XSS-Protection = "1; mode=block"
Content-Security-Policy = "default-src 'self'"
# Page 404 personnalisée
[[redirects]]
from = "/*"
to = "/404.html"
status = 40