<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Contactez Jérémy pour une demande de dépannage, formation ou réparation informatique.">
  <title>Contact — Jérémy</title>

  <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>
  <header>
    <nav class="main-nav" aria-label="Navigation principale">
      <!-- Bouton du menu mobile. Ton JavaScript cherche la classe .burger -->
      <button class="burger" aria-label="Ouvrir le menu">
        ☰
      </button>

      <!-- Ton JavaScript cherche précisément nav ul -->
      <ul>
        <li><a href="index.html">Accueil</a></li>
        <li><a href="about.html">À propos</a></li>
        <li><a href="contact.html" aria-current="page">Contact</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <section class="animate-on-scroll">
      <h1>Contact</h1>
      <p>
        Utilisez ce formulaire pour me contacter au sujet d’un dépannage,
        d’une formation ou d’une réparation informatique.
      </p>
    </section>

    <section class="animate-on-scroll">
      <!--
        FORMULAIRE DE CONTACT NETLIFY

        Ce formulaire est écrit directement dans contact.html.
        Netlify va le détecter automatiquement lors du déploiement du site.

        Important :
        - name="contact" donne un nom au formulaire.
        - method="POST" permet d'envoyer les données.
        - data-netlify="true" indique à Netlify qu'il doit gérer ce formulaire.
        - Le champ caché form-name confirme le nom du formulaire envoyé.
      -->
      <form name="contact" method="POST" data-netlify="true" class="contact-form">
        <input type="hidden" name="form-name" value="contact">

        <h2>Envoyer un message</h2>

        <label for="nom">Votre nom</label>
        <input
          type="text"
          id="nom"
          name="nom"
          placeholder="Ex : Jean Dupont"
          required
        >

        <label for="email">Votre e-mail</label>
        <input
          type="email"
          id="email"
          name="email"
          placeholder="Ex : jean@email.fr"
          required
        >

        <label for="sujet">Sujet de votre demande</label>
        <select id="sujet" name="sujet" required>
          <option value="">Choisir un sujet</option>
          <option value="depannage">Dépannage informatique</option>
          <option value="formation">Formation numérique</option>
          <option value="reparation">Réparation</option>
          <option value="autre">Autre demande</option>
        </select>

        <label for="message">Votre message</label>
        <textarea
          id="message"
          name="message"
          rows="6"
          placeholder="Décrivez votre besoin le plus simplement possible..."
          required
        ></textarea>

        <button type="submit">Envoyer</button>
      </form>
    </section>
  </main>

  <footer>
    <p>&copy; 2026 Jérémy Vanbaelinghem</p>
  </footer>

  <script src="assets/js/main.js"></script>
</body>
</html>
